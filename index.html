<!DOCTYPE html>
<html>
<head>
    <title>Study Planner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f3ff;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h3 {
            color: #6d5cae;
        }

        input, textarea, button {
            padding: 8px;
            margin-top: 5px;
            width: 100%;
        }

        button {
            background: #6d5cae;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        ul {
            padding-left: 20px;
        }

        .habit {
            margin-top: 10px;
            padding: 10px;
            background: #fafafa;
            border-radius: 10px;
        }

        .days-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .checkbox-row {
            display: flex;
            justify-content: space-between;
        }

        .note {
            background: #fafafa;
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
        }

        #focusScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f3ff;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #555;
        }

        /* 🔥 FIX counter position */
        #sfc31453c660936e64147ef69c7c019f3ab3cb3e789 {
            position: static !important;
            display: inline-block !important;
        }

        /* 🔥 Hide unwanted link */
        a[href*="free-counters"] {
            display: none !important;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>🎯 Goal</h3>
        <input id="goalInput" type="number">
        <button onclick="setGoal()">Set</button>
        <p id="goalDisplay"></p>
    </div>

    <div class="card">
        <h3>📋 Tasks</h3>
        <input id="taskInput">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <div class="card">
        <h3>⏱️ Focus</h3>
        <input id="focusInput" type="number" placeholder="optional">
        <button onclick="startFocus()">Start</button>
    </div>

    <div class="card">
        <h3>📊 Progress</h3>
        <p id="studyTime">Study Time: 0 min</p>
        <p id="tasksDone">Tasks Done: 0</p>
    </div>

    <div class="card">
        <h3>📅 Habits</h3>
        <input id="habitInput">
        <button onclick="addHabit()">Add</button>
        <div id="habitList"></div>
    </div>

    <div class="card">
        <h3>📝 Notes</h3>
        <textarea id="noteInput"></textarea>
        <button onclick="addNote()">Add Note</button>
        <div id="noteList"></div>
    </div>

</div>

<div id="focusScreen">
    <h1 id="focusTimer">25:00</h1>
    <button onclick="endFocus()">End</button>
</div>

<!-- 👀 Visitor Counter Footer -->
<div class="footer">
    👀 Visitors:
    <script type='text/javascript' src='https://www.freevisitorcounters.com/auth.php?id=31453c660936e64147ef69c7c019f3ab3cb3e789'></script>
    <script type="text/javascript" src="https://www.freevisitorcounters.com/en/home/counter/1529094/t/11"></script>
</div>

<script>
let tasksDone = 0;
let studyTime = 0;
let time;
let interval;
let isFocusing = false;

document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        if(document.activeElement.id === "goalInput") setGoal();
        if(document.activeElement.id === "taskInput") addTask();
        if(document.activeElement.id === "habitInput") addHabit();
        if(document.activeElement.id === "noteInput") addNote();
    }
});

function setGoal(){
    goalDisplay.textContent = "Goal: " + goalInput.value;
}

function addTask(){
    let t = taskInput.value;
    if(!t) return;

    let li = document.createElement("li");
    li.textContent = t;

    li.onclick = () => {
        li.style.textDecoration = "line-through";
        tasksDone++;
        document.getElementById("tasksDone").textContent =
        "Tasks Done: " + tasksDone;
    };

    taskList.appendChild(li);
    taskInput.value="";
}

function startFocus(){
    let input = focusInput.value;

    focusScreen.style.display="flex";
    isFocusing = true;

    if(!input){
        focusTimer.textContent="∞";
        interval = setInterval(()=>{
            studyTime++;
            updateStudy();
        },1000);
    } else {
        time = input * 60;
        interval = setInterval(updateTimer,1000);
    }
}

function updateTimer(){
    let m = Math.floor(time/60);
    let s = time % 60;

    focusTimer.textContent = m + ":" + (s<10?"0":"") + s;

    time--;
    studyTime++;
    updateStudy();

    if(time < 0){
        clearInterval(interval);
        alert("Done 🎉");
    }
}

function updateStudy(){
    document.getElementById("studyTime").textContent =
    "Study Time: " + Math.floor(studyTime/60) + " min";
}

function endFocus(){
    clearInterval(interval);
    focusScreen.style.display="none";
    isFocusing=false;
}

document.addEventListener("visibilitychange",()=>{
    if(document.hidden && isFocusing){
        setTimeout(()=>alert("Go study 😏"),100);
    }
});

function addHabit(){
    let name = habitInput.value;
    if(!name) return;

    let div = document.createElement("div");
    div.className = "habit";

    div.innerHTML = `
    <strong>${name}</strong>
    <div class="days-row">
        <span>Mon</span><span>Tue</span><span>Wed</span>
        <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
    </div>
    <div class="checkbox-row">
        <input type="checkbox"><input type="checkbox"><input type="checkbox">
        <input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox">
    </div>
    <button onclick="this.parentElement.remove()">Delete</button>
    `;

    habitList.appendChild(div);
    habitInput.value="";
}

function addNote(){
    let text = noteInput.value;
    if(!text) return;

    let div = document.createElement("div");
    div.className = "note";

    div.innerHTML = `
    <p>${text}</p>
    <button onclick="this.parentElement.remove()">Delete</button>
    `;

    noteList.appendChild(div);
    noteInput.value="";
}
</script>

</body>
</html>
