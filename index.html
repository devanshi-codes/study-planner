<!DOCTYPE html>
<html>
<head>
    <title>Study Planner</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ede7f6, #d1c4e9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 18px;
            width: 380px;
            text-align: center;
        }

        h1 {
            color: #5e548e;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            border: 1px solid #ddd;
            width: 80%;
        }

        #minutesInput {
            width: 60%;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #7e57c2;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f3e5f5;
            margin: 8px;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Hover effect */
        li:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }

        #time {
            font-size: 28px;
            margin-top: 10px;
            color: #5e548e;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Study Planner</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="date" id="dateInput">
    <br>
    <button onclick="addTask()">Add Task</button>
    <button onclick="clearAll()">Clear All</button>

    <p id="taskCount">Total Tasks: 0</p>

    <h2 id="time">00:00</h2>

    <input type="number" id="minutesInput" placeholder="Enter minutes">
    <br>
    <button onclick="setCustomTime()">Set Timer</button>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>

    <ul id="taskList"></ul>

</div>

<script>
    window.onload = function () {
        loadTasks();
        updateTaskCount();
    };

    function addTask() {
        let task = document.getElementById("taskInput").value;
        let date = document.getElementById("dateInput").value;

        if (task === "") return;

        createTask(task, date);
        saveTasks();
        updateTaskCount();

        document.getElementById("taskInput").value = "";
        document.getElementById("dateInput").value = "";
    }

    function createTask(text, date = "", done = false) {
        let li = document.createElement("li");

        let span = document.createElement("span");
        span.textContent = date ? text + " (" + date + ")" : text;

        if (done) span.style.textDecoration = "line-through";

        span.onclick = function () {
            span.style.textDecoration =
                span.style.textDecoration === "line-through" ? "none" : "line-through";
            saveTasks();
        };

        let del = document.createElement("button");
        del.textContent = "❌";

        del.onclick = function () {
            li.remove();
            saveTasks();
            updateTaskCount();
        };

        li.appendChild(span);
        li.appendChild(del);
        document.getElementById("taskList").appendChild(li);
    }

    function saveTasks() {
        let tasks = [];
        document.querySelectorAll("#taskList li").forEach(li => {
            let span = li.querySelector("span");
            let text = span.textContent;
            let done = span.style.textDecoration === "line-through";

            let match = text.match(/(.*)\s\((.*)\)/);
            tasks.push({
                text: match ? match[1] : text,
                date: match ? match[2] : "",
                done: done
            });
        });

        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        tasks.forEach(t => createTask(t.text, t.date, t.done));
    }

    function clearAll() {
        document.getElementById("taskList").innerHTML = "";
        localStorage.removeItem("tasks");
        updateTaskCount();
    }

    function updateTaskCount() {
        let count = document.querySelectorAll("#taskList li").length;
        document.getElementById("taskCount").textContent = "Total Tasks: " + count;
    }

    // Enter key support
    document.getElementById("taskInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            addTask();
        }
    });

    // Timer
    let timeLeft = 0;
    let timer;

    function setCustomTime() {
        let min = document.getElementById("minutesInput").value;

        if (min <= 0) {
            alert("Enter valid minutes");
            return;
        }

        timeLeft = min * 60;
        updateDisplay();
    }

    function startTimer() {
        if (timer || timeLeft <= 0) return;

        timer = setInterval(() => {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                clearInterval(timer);
                timer = null;
                alert("Time's up!");
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timer);
        timer = null;
        timeLeft = 0;
        document.getElementById("time").textContent = "00:00";
    }

    function updateDisplay() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;

        document.getElementById("time").textContent =
            String(m).padStart(2, '0') + ":" +
            String(s).padStart(2, '0');
    }
</script>

</body>
</html>
