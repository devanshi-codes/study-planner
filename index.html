<!DOCTYPE html>
<html>
<head>
    <title>Study Planner</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ede7f6, #d1c4e9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 18px;
            width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: #5e548e;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        input {
            padding: 12px;
            margin: 6px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            width: 85%;
            background: #fafafa;
        }

        input:focus {
            border-color: #9575cd;
            box-shadow: 0 0 5px rgba(149, 117, 205, 0.5);
        }

        #minutesInput {
            width: 60%;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #9575cd, #7e57c2);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.05);
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 18px;
        }

        li {
            background: #f3e5f5;
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e1bee7;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
        }

        #time {
            font-size: 28px;
            color: #5e548e;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Study Planner</h1>

    <input type="text" id="taskInput" placeholder="Enter your task">
    <input type="date" id="dateInput">
    <button onclick="addTask()">Add Task</button>

    <!-- TIMER -->
    <h2 id="time">00:00</h2>
    <input type="number" id="minutesInput" placeholder="Enter minutes">
    <br>
    <button onclick="setCustomTime()">Set Timer</button>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>

    <ul id="taskList"></ul>

</div>

<script>
    window.onload = function () {
        loadTasks();
    };

    function addTask() {
        let task = document.getElementById("taskInput").value;
        let date = document.getElementById("dateInput").value;

        if (task === "") return;

        createTask(task, date);
        saveTasks();

        document.getElementById("taskInput").value = "";
        document.getElementById("dateInput").value = "";
    }

    function createTask(taskText, date = "", isDone = false) {
        let li = document.createElement("li");

        let span = document.createElement("span");
        span.textContent = date ? taskText + " (" + date + ")" : taskText;

        span.onclick = function () {
            span.style.textDecoration =
                span.style.textDecoration === "line-through" ? "none" : "line-through";
            saveTasks();
        };

        if (isDone) {
            span.style.textDecoration = "line-through";
        }

        let deleteBtn = document.createElement("button");
        deleteBtn.textContent = "❌";
        deleteBtn.classList.add("delete-btn");

        deleteBtn.onclick = function () {
            li.remove();
            saveTasks();
        };

        li.appendChild(span);
        li.appendChild(deleteBtn);

        document.getElementById("taskList").appendChild(li);
    }

    function saveTasks() {
        let tasks = [];
        let listItems = document.querySelectorAll("#taskList li");

        listItems.forEach(function (li) {
            let span = li.querySelector("span");
            let text = span.textContent;
            let isDone = span.style.textDecoration === "line-through";

            let match = text.match(/(.*)\s\((.*)\)/);
            let taskText = match ? match[1] : text;
            let date = match ? match[2] : "";

            tasks.push({ text: taskText, date: date, done: isDone });
        });

        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        tasks.forEach(function (task) {
            createTask(task.text, task.date, task.done);
        });
    }

    // TIMER CODE
    let timeLeft = 0;
    let timer;

    function setCustomTime() {
        let minutes = document.getElementById("minutesInput").value;

        if (minutes === "" || minutes <= 0) {
            alert("Enter valid minutes");
            return;
        }

        timeLeft = minutes * 60;
        updateDisplay();
    }

    function startTimer() {
        if (timer || timeLeft <= 0) return;

        timer = setInterval(function () {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                clearInterval(timer);
                timer = null;
                alert("Time's up!");
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timer);
        timer = null;
        timeLeft = 0;
        document.getElementById("time").textContent = "00:00";
    }

    function updateDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        document.getElementById("time").textContent =
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0');
    }
</script>

</body>
</html>
